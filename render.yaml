services:
  - type: web
    name: hireeve-api
    runtime: node
    region: singapore
    plan: free
    buildCommand: |
      corepack enable &&
      pnpm install --frozen-lockfile &&
      cd packages/core && pnpm build &&
      cd ../api && npx prisma generate && pnpm build
    startCommand: cd packages/api && (npx prisma migrate deploy || echo "[WARN] Migration failed, continuing...") && node dist/index.js
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: OPENROUTER_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: PORT
        value: "3001"
